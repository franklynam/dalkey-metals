version: 1
frontend:
  phases:
    preBuild:
      commands:
        - aws s3 cp s3://$S3_BUCKET/dl-area-plus-piers-texture.jpg public/textures/dl-area-plus-piers-texture.jpg
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
